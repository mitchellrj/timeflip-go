name: Release

on:
  push:
    tags:
      - v*

permissions: read-all

jobs:
  validate-tag:
    name: Validate SemVer tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      version: ${{ steps.validate.outputs.version }}
      is_prerelease: ${{ steps.validate.outputs.is_prerelease }}
      release_name: ${{ steps.validate.outputs.release_name }}
    steps:
      - name: Validate tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          if [[ ! "$tag" =~ $semver ]]; then
            printf 'Tag %s is not a valid leading-v SemVer tag.\n' "$tag" >&2
            exit 1
          fi

          version="${tag#v}"
          is_prerelease=false
          if [[ "$version" == *-* ]]; then
            is_prerelease=true
          fi

          {
            printf 'tag=%s\n' "$tag"
            printf 'version=%s\n' "$version"
            printf 'is_prerelease=%s\n' "$is_prerelease"
            printf 'release_name=%s\n' "$tag"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build SLSA artifacts (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: validate-tag
    permissions:
      id-token: write
      contents: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            config-file: .slsa-goreleaser/linux-amd64.yml
          - goos: linux
            goarch: arm64
            config-file: .slsa-goreleaser/linux-arm64.yml
    # SLSA verifier requires this reusable workflow ref to be refs/tags/vX.Y.Z.
    # See:
    # * https://github.com/slsa-framework/slsa-github-generator/blob/main/README.md#referencing-slsa-builders-and-generators
    # * https://github.com/slsa-framework/slsa-github-generator/issues/4440
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v2.1.0
    with:
      go-version-file: go.mod
      config-file: ${{ matrix.config-file }}
      upload-assets: false

  publish-release:
    name: Publish GitHub Release
    needs:
      - validate-tag
      - build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.validate-tag.outputs.tag }}
      IS_PRERELEASE: ${{ needs.validate-tag.outputs.is_prerelease }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag==v6.0.2
        with:
          fetch-depth: 0

      - name: Download release artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/release-assets
          for artifact in \
            timeflip-demo-linux-amd64 \
            timeflip-demo-linux-amd64.intoto.jsonl \
            timeflip-demo-linux-arm64 \
            timeflip-demo-linux-arm64.intoto.jsonl
          do
            gh run download "$GITHUB_RUN_ID" \
              --name "$artifact" \
              --dir build/release-assets
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail

          cd build/release-assets
          mapfile -t files < <(
            find . -maxdepth 1 -type f \
              ! -name '*.intoto.jsonl' \
              ! -name 'SHA256SUMS.txt' \
              -printf '%f\n' | sort
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            printf 'No release binaries found for checksum generation.\n' >&2
            exit 1
          fi

          sha256sum "${files[@]}" > SHA256SUMS.txt

      - name: Create release with assets and tag notes
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            printf 'Release %s already exists; not modifying existing release.\n' "$RELEASE_TAG"
            exit 0
          fi

          args=(--title "$RELEASE_TAG" --notes-from-tag)
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          mapfile -t assets < <(find build/release-assets -maxdepth 1 -type f -print | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            printf 'No release assets found.\n' >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${args[@]}" "${assets[@]}"

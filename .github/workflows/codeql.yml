name: CodeQL

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-actions:
    name: CodeQL Actions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Analyze GitHub Actions workflows
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions

  analyze-go:
    name: CodeQL Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual

      - name: Build Go packages
        run: go build ./...

      - name: Analyze Go
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:go
